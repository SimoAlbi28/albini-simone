# configurazione dell'applicazione spring boot
# i valori qui dentro vengono letti automaticamente all'avvio

# porta di ascolto del server (default 8080)
server.port=8080

# nome dell'app - appare nei log
spring.application.name=portale-backend



spring.datasource.url=jdbc:h2:mem:portale_db
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# console di H2 - la apro nel browser per vedere/modificare i dati
# tipo Workbench, ma direttamente dentro al backend
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console


spring.jpa.hibernate.ddl-auto=update

# stampa nei log le query sql che hibernate esegue (utile per il debug
# e anche per capire cosa succede sotto al cofano)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# dialetto H2
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect


springdoc.swagger-ui.path=/swagger-ui.html


